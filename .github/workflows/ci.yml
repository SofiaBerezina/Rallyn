name: CI

on:
  push: {}
  pull_request: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm ci
        working-directory: ./activity-platform

      - name: Lint
        run: |
          npm run lint -- --max-warnings=0 --ignore-pattern coverage
        working-directory: ./activity-platform

      - name: Format check
        run: npm run format:check
        working-directory: ./activity-platform

  test:
    name: Test (coverage)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm ci
        working-directory: ./activity-platform

      - name: Run tests (coverage)
        run: npm run test:coverage
        working-directory: ./activity-platform

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: activity-platform/coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Determine repository name
        id: repo
        run: echo "REPO_NAME=$(echo ${GITHUB_REPOSITORY} | cut -d'/' -f2)" >> $GITHUB_ENV

      - name: Install deps
        run: npm ci
        working-directory: ./activity-platform

      - name: Build
        run: npm run build -- --base=/$REPO_NAME/
        working-directory: ./activity-platform

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: activity-platform/dist

  pages-deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/project'
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Prepare public folder
        run: |
          mkdir -p public_temp
          for item in $(ls -A | grep -v '^public_temp$'); do
            cp -r "$item" public_temp/
          done
          mv public_temp public
          if [ -f public/index.html ]; then
            cp public/index.html public/404.html
          fi
          echo "✅ Public folder contents:"
          ls -la public/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: public

